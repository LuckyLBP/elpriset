              "acceptedAnswer": {
                "@type": "Answer",
                "text": "Spotpriset är det rörliga elpriset som sätts timme för timme på den nordiska elbörsen Nord Pool. Priset styrs av utbud och efterfrågan och varierar kraftigt beroende på väder, förbrukning och tillgång på el i Norden."

              "name": "Hur sätts elpriset timme för timme?",
              "acceptedAnswer": {
                "@type": "Answer",
                "text": "Varje dag klockan 12–13 publicerar Nord Pool priserna för kommande dygn — ett pris per timme. Det är dessa priser du ser på Elpriset.se. Priserna för morgondagen brukar alltså finnas tillgängliga redan på eftermiddagen."
              }
            },
            {
              "@type": "Question",
              "name": "Vad är de svenska elområdena SE1–SE4?",
              "acceptedAnswer": {
                "@type": "Answer",
                "text": "Sverige är uppdelat i fyra elområden: SE1 (Luleå), SE2 (Sundsvall), SE3 (Stockholm) och SE4 (Malmö). Varje område har sitt eget spotpris beroende på lokal produktion och kapacitet i elnätet."
              }
            },
            {
              "@type": "Question",
              "name": "Varför skiljer sig priset mellan elområden?",
              "acceptedAnswer": {
                "@type": "Answer",
                "text": "Flaskhalsarna i stamnätet gör att el inte alltid kan transporteras fritt mellan norr och söder. I SE1 och SE2 produceras mycket vattenkraft, vilket ofta ger lägre priser. I SE3 och SE4 är förbrukningen hög och beroendet av import större."
              }
            },
            {
              "@type": "Question",
              "name": "När på dygnet är elen billigast?",
              "acceptedAnswer": {
                "@type": "Answer",
                "text": "Generellt är elen billigast mitt på natten (kl 00–06) och dyrast under morgon- och kvällstopparna (kl 07–09 och 17–20) då förbrukningen är som högst. Använd timprislistan för att se exakt när det är billigast just idag."
              }
            },
            {
              "@type": "Question",
              "name": "Vad ingår inte i spotpriset?",
              "acceptedAnswer": {
                "@type": "Answer",
                "text": "Spotpriset som visas här är enbart börspriset i öre/kWh. Det inkluderar inte nätavgift, elhandelspåslag, energiskatt eller moms. Din faktiska elkostnad är högre — ofta 2–4 gånger spotpriset beroende på din elleverantör."
